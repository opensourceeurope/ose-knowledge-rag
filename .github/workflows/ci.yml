name: CI

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check the plugin agent is in sync with the canonical persona
        run: ./scripts/sync-agent.sh --check

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Build + test the chat function
        working-directory: function
        run: |
          npm ci
          npm run build
          npm test

      # Workflow linting/auditing lives in security-audit.yml (zizmor, auto-discovers
      # all workflows) — no hand-maintained file list here.
