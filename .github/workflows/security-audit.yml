# Audit workflow files for supply-chain issues with zizmor.
# Catches: unpinned actions, @latest CLI installs, dangerous triggers, etc.
# Auto-discovers every workflow under .github/workflows/ — no hand-maintained list.
name: Security audit (zizmor)

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/zizmor.yml'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/zizmor.yml'

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install zizmor
        # pipx is preinstalled on ubuntu-latest runners.
        # Pin zizmor explicitly — bump deliberately after reviewing the changelog.
        run: pipx install zizmor==1.25.2

      - name: Run zizmor on workflow files
        # Default severity (exits non-zero on any finding). For the noisier checks
        # (template-injection on secret interpolation, concurrency, anonymous jobs)
        # re-run locally with --pedantic.
        run: zizmor .github/workflows/
