name: Deploy MCP to Scaleway

on:
  release:
    types: [published]
  workflow_dispatch: {}

# Required repo secrets: SCW_ACCESS_KEY, SCW_SECRET_KEY, SCW_DEFAULT_PROJECT_ID, SCW_DEFAULT_ORGANIZATION_ID
# Required repo variables: SCW_REGION (e.g. pl-waw), SCW_REGISTRY_NAMESPACE (e.g. opensourceeurope),
#   SCW_CONTAINER_ID (pre-created serverless container ID)

permissions:
  contents: read

concurrency:
  group: deploy-mcp
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    env:
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
      SCW_DEFAULT_REGION: ${{ vars.SCW_REGION }}
      REGISTRY: rg.${{ vars.SCW_REGION }}.scw.cloud/${{ vars.SCW_REGISTRY_NAMESPACE }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Scaleway CLI
        run: |
          curl -fsSL https://github.com/scaleway/scaleway-cli/releases/download/v2.56.1/scaleway-cli_2.56.1_linux_amd64 \
            -o /usr/local/bin/scw
          chmod +x /usr/local/bin/scw
          scw version

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: rg.${{ vars.SCW_REGION }}.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: .opencrane/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/ose-mcp:latest
            ${{ env.REGISTRY }}/ose-mcp:${{ github.sha }}

      - name: Deploy new image to the serverless container
        env:
          CONTAINER_ID: ${{ vars.SCW_CONTAINER_ID }}
          IMAGE: ${{ env.REGISTRY }}/ose-mcp:${{ github.sha }}
        run: |
          # NB: `update` uses image=  (registry-image= is only valid on `create`)
          scw container container update "$CONTAINER_ID" image="$IMAGE" --wait
          scw container container deploy "$CONTAINER_ID" --wait
